name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Server CI ──────────────────────────────────────────────────────────────
  server-ci:
    name: Server (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Run tests
        working-directory: server
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          MONGODB_URI: mongodb://localhost:27017/expense-tracker-test

      - name: Lint
        working-directory: server
        run: npx eslint . --ext .js
        continue-on-error: true  # No eslint config yet — won't block CI

  # ── Client CI ──────────────────────────────────────────────────────────────
  client-ci:
    name: Client (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: TypeScript check
        working-directory: client
        run: npx tsc --noEmit

      - name: Lint
        working-directory: client
        run: npx eslint . --ext .ts,.tsx
        continue-on-error: true  # No eslint config yet — won't block CI

      - name: Build
        working-directory: client
        run: npm run build
